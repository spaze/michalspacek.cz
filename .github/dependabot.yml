version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 3

  - package-ecosystem: "npm"
    directory: "/site"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 5

  - package-ecosystem: "npm"
    directory: "/site/vendor/nette/forms"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 5

  - package-ecosystem: "npm"
    directory: "/site/vendor/tracy/tracy"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 5

  - package-ecosystem: "composer"
    directory: "/site"
    schedule:
      interval: "monthly"
    cooldown:
      default-days: 5
    allow:
      # Allow both direct and indirect updates for all packages
      - dependency-type: "all"
